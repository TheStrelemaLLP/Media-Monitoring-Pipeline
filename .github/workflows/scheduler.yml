name: Run main.py at 6 AM IST

on:
  schedule:
    # - cron: '30 0 * * *'  # 6:00 AM IST daily
  - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Adjust if needed

    - name: Install dependencies
      run: pip install -r .\requirements

    - name: Run main.py
      run: python .\main.py
