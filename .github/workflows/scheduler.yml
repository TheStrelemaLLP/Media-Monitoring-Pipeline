name: Run main.py at 6 AM IST

on:
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST daily
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: true   # needed to push back
        fetch-depth: 0              # get full history

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Adjust if needed

    - name: Install Chrome and WebDriver
      uses: browser-actions/setup-chrome@v1

    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Check ChromeDriver version
      run: chromedriver --version

    - name: Install dependencies
      run: pip install -r .\requirements

    - name: Run main.py
      run: python .\main.py

    - name: Commit and Push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add output/  # only commit output folder (change if needed)
        git commit -m "Auto-update output on $(date)" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref }}
